<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 추첨기</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
        color: #fff;
      }

      h1 {
        margin-bottom: 30px;
        font-size: 2.5rem;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      }

      /* 로또 기계 본체 (고정 위치) */
      .lotto-machine {
        position: relative;
        width: 320px;
        height: 380px;
        margin-bottom: 40px;
        /* 기계 자체는 항상 제자리에 고정 */
        transform: translateZ(0);
      }

      /* 흔들림은 내부 래퍼에만 적용해서 레이아웃이 밀리지 않게 함 */
      .machine-inner {
        position: absolute;
        inset: 0;
        transform-origin: center bottom;
        will-change: transform;
      }

      /* 기계 상단 (볼이 튀는 공간) */
      .machine-top {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 280px;
        height: 200px;
        background: radial-gradient(
          ellipse at center,
          rgba(255, 255, 255, 0.15) 0%,
          transparent 70%
        );
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
        overflow: hidden;
        z-index: 1;
      }

      /* 유리 반사 효과 */
      .machine-top::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 20px;
        width: 60px;
        height: 30px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        transform: rotate(-20deg);
      }

      /* 기계 하단 */
      .machine-bottom {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 160px;
        background: #16213e;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px 10px 20px 20px;
        z-index: 2;
      }

      /* 기계 다리 */
      .machine-leg {
        position: absolute;
        bottom: -20px;
        width: 15px;
        height: 25px;
        background: #0f3460;
        border-radius: 0 0 5px 5px;
      }
      .machine-leg.left {
        left: 60px;
      }
      .machine-leg.right {
        right: 60px;
      }

      /* 출구 (볼이 나오는 구멍) */
      .exit-hole {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 70px;
        height: 70px;
        background: #0a0a1a;
        border: 3px solid #e94560;
        border-radius: 50%;
        box-shadow:
          inset 0 0 20px rgba(233, 69, 96, 0.3),
          0 0 15px rgba(233, 69, 96, 0.5);
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: visible;
      }

      /* 출구 안쪽 그림자 */
      .exit-hole::before {
        content: "";
        position: absolute;
        width: 50px;
        height: 50px;
        background: radial-gradient(circle, #1a1a2e 0%, #0a0a1a 100%);
        border-radius: 50%;
      }

      /* 출구 불빛 (볼 나올 때 깜빡임) */
      .exit-light {
        position: absolute;
        top: -5px;
        left: -5px;
        right: -5px;
        bottom: -5px;
        border-radius: 50%;
        border: 2px solid #ffd700;
        opacity: 0;
        animation: none;
      }

      @keyframes lightFlash {
        0%,
        100% {
          opacity: 0;
          box-shadow: 0 0 0 rgba(255, 215, 0, 0);
        }
        50% {
          opacity: 1;
          box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }
      }

      /* 기계 내부에서 튀는 볼들 */
      .machine-ball {
        position: absolute;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 11px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        box-shadow:
          inset -3px -3px 6px rgba(0, 0, 0, 0.3),
          inset 3px 3px 6px rgba(255, 255, 255, 0.3),
          0 2px 8px rgba(0, 0, 0, 0.4);
        z-index: 1;
        will-change: transform;
      }

      /* 볼 색상 클래스 */
      .ball-yellow {
        background: #f4d03f;
        color: #333;
      }
      .ball-blue {
        background: #3498db;
      }
      .ball-red {
        background: #e74c3c;
      }
      .ball-gray {
        background: #7f8c8d;
      }
      .ball-green {
        background: #2ecc71;
      }

      /* 기계 내부에서 부드럽게 떠다니는 애니메이션 */
      @keyframes bounceAround {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        25% {
          transform: translate(26px, -34px) rotate(90deg);
        }
        50% {
          transform: translate(-18px, -52px) rotate(180deg);
        }
        75% {
          transform: translate(30px, -28px) rotate(270deg);
        }
        100% {
          transform: translate(0, 0) rotate(360deg);
        }
      }

      /* 출구로 내려가는 애니메이션 */
      @keyframes dropToExit {
        0% {
          transform: translate(var(--start-x), var(--start-y)) scale(1);
          opacity: 1;
        }
        55% {
          transform: translate(var(--mid-x), var(--mid-y)) scale(1.08);
          opacity: 1;
        }
        100% {
          transform: translate(var(--end-x), var(--end-y)) scale(0.75);
          opacity: 0;
        }
      }

      /* 출구에서 튀어나오는 애니메이션 */
      @keyframes popOut {
        0% {
          transform: translate(-50%, 20px) scale(0.3);
          opacity: 0;
        }
        45% {
          transform: translate(-50%, -32px) scale(1.25);
          opacity: 1;
        }
        70% {
          transform: translate(-50%, -48px) scale(1.08);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -10px) scale(1);
          opacity: 1;
        }
      }

      /* 결과 볼 컨테이너 */
      .result-container {
        display: flex;
        gap: 12px;
        margin-bottom: 30px;
        min-height: 60px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        padding: 0 20px;
      }

      /* 결과 볼 */
      .result-ball {
        position: relative;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        font-size: 18px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        box-shadow:
          inset -4px -4px 8px rgba(0, 0, 0, 0.3),
          inset 4px 4px 8px rgba(255, 255, 255, 0.3),
          0 4px 15px rgba(0, 0, 0, 0.4),
          0 0 20px rgba(255, 255, 255, 0.1);
        opacity: 0;
        transform: scale(0);
        will-change: transform, opacity;
        animation: ballAppear 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes ballAppear {
        0% {
          opacity: 0;
          transform: scale(0) rotate(-180deg);
        }
        60% {
          opacity: 1;
          transform: scale(1.18) rotate(8deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      /* 볼 번호 순서 표시 */
      .ball-order {
        position: absolute;
        top: -8px;
        right: -8px;
        width: 22px;
        height: 22px;
        background: #e94560;
        border-radius: 50%;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      }

      /* + 기호 */
      .plus-sign {
        font-size: 24px;
        font-weight: bold;
        color: #ffd700;
        margin: 0 5px;
        opacity: 0;
        animation: fadeIn 0.3s ease-out forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      /* 추첨 버튼 */
      .draw-btn {
        padding: 15px 50px;
        font-size: 1.2rem;
        font-weight: bold;
        border: none;
        border-radius: 50px;
        background: #e94560;
        color: #fff;
        cursor: pointer;
        transition:
          background 0.3s ease,
          transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.3s ease;
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
      }

      .draw-btn:hover:not(:disabled) {
        background: #ff6b6b;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
      }

      .draw-btn:active:not(:disabled) {
        transform: translateY(0) scale(0.97);
      }

      .draw-btn:disabled {
        background: #555;
        cursor: not-allowed;
        box-shadow: none;
      }

      /*
        기계 흔들림 효과 (수정됨)
        - 시작/끝이 모두 원위치(0,0)라 기계가 제자리에 고정됨
        - translateX(-50%) 사용하던 기존 버그 제거
      */
      @keyframes machineShake {
        0%,
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
        15% {
          transform: translate(2px, -1px) rotate(0.6deg);
        }
        30% {
          transform: translate(-2px, 1px) rotate(-0.6deg);
        }
        45% {
          transform: translate(1.6px, -1px) rotate(0.4deg);
        }
        60% {
          transform: translate(-1.6px, 1px) rotate(-0.4deg);
        }
        75% {
          transform: translate(1px, 0) rotate(0.2deg);
        }
        90% {
          transform: translate(-0.6px, 0) rotate(-0.1deg);
        }
      }

      .machine-shake {
        animation: machineShake 0.55s cubic-bezier(0.36, 0.07, 0.19, 0.97);
      }

      /* 추첨 완료 메시지 */
      @keyframes completePop {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.5);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.1);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }

      @keyframes completeFadeOut {
        to {
          opacity: 0;
          transform: translate(-50%, -60%) scale(0.95);
        }
      }
    </style>
  </head>
  <body>
    <h1>🎰 로또 추첨기</h1>

    <!-- 로또 기계 (본체는 고정, 흔들림은 machine-inner에만 적용) -->
    <div class="lotto-machine">
      <div class="machine-inner" id="machineInner">
        <div class="machine-top" id="machineTop">
          <!-- 여기서 볼들이 튀어다님 -->
        </div>
        <div class="machine-bottom">
          <div class="exit-hole" id="exitHole">
            <div class="exit-light" id="exitLight"></div>
          </div>
        </div>
        <div class="machine-leg left"></div>
        <div class="machine-leg right"></div>
      </div>
    </div>

    <!-- 결과 표시 -->
    <div class="result-container" id="resultContainer"></div>

    <!-- 추첨 버튼 -->
    <button class="draw-btn" id="drawBtn">🎱 추첨 시작</button>

    <script>
      // 유틸리티 함수
      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      function getColorClass(num) {
        if (num <= 10) return "ball-yellow";
        if (num <= 20) return "ball-blue";
        if (num <= 30) return "ball-red";
        if (num <= 40) return "ball-gray";
        return "ball-green";
      }

      // 로또 번호 생성 (1~45 중 6개)
      function generateLottoNumbers() {
        const numbers = [];
        while (numbers.length < 6) {
          const num = Math.floor(Math.random() * 45) + 1;
          if (!numbers.includes(num)) numbers.push(num);
        }
        return numbers.sort((a, b) => a - b);
      }

      // 기계 내부에 랜덤 볼들 생성 (장식용)
      function createMachineBalls() {
        const container = document.getElementById("machineTop");
        container.innerHTML = "";

        for (let i = 0; i < 14; i++) {
          const ball = document.createElement("div");
          const num = Math.floor(Math.random() * 45) + 1;
          ball.className = `machine-ball ${getColorClass(num)}`;
          ball.textContent = num;

          // 랜덤 위치
          const left = Math.random() * 210 + 15;
          const top = Math.random() * 110 + 30;
          ball.style.left = `${left}px`;
          ball.style.top = `${top}px`;

          // 부드러운 떠다님 애니메이션 (느리고 자연스럽게)
          const duration = 2 + Math.random() * 2;
          const delayS = Math.random() * 2;
          ball.style.animation = `bounceAround ${duration}s ${delayS}s infinite ease-in-out`;

          container.appendChild(ball);
        }
      }

      // 메인 추첨 함수
      async function startDraw() {
        const btn = document.getElementById("drawBtn");
        const resultContainer = document.getElementById("resultContainer");
        const machineInner = document.getElementById("machineInner");
        const exitHole = document.getElementById("exitHole");
        const exitLight = document.getElementById("exitLight");
        const machineTop = document.getElementById("machineTop");

        // 버튼 비활성화
        btn.disabled = true;
        resultContainer.innerHTML = "";

        // 로또 번호 생성
        const numbers = generateLottoNumbers();

        // 기계 내부에 볼들 채우기
        createMachineBalls();

        // 각 번호마다 추첨
        for (let i = 0; i < numbers.length; i++) {
          const num = numbers[i];

          // 1. 기계 흔들림 (제자리에서만 진동)
          machineInner.classList.remove("machine-shake");
          void machineInner.offsetWidth; // 애니메이션 재시작 트릭
          machineInner.classList.add("machine-shake");

          // 2. 출구 불빛 깜빡임
          exitLight.style.animation = "none";
          void exitLight.offsetWidth;
          exitLight.style.animation = "lightFlash 0.4s ease-out 2";

          // 3. 내부 볼이 출구로 이동하는 효과
          const movingBall = document.createElement("div");
          movingBall.className = `machine-ball ${getColorClass(num)}`;
          movingBall.textContent = num;
          movingBall.style.left = "50%";
          movingBall.style.top = "50%";
          movingBall.style.zIndex = "10";
          movingBall.style.width = "35px";
          movingBall.style.height = "35px";
          movingBall.style.fontSize = "14px";
          machineTop.appendChild(movingBall);

          // 출구 방향으로 이동 좌표 계산
          const machineRect = machineTop.getBoundingClientRect();
          const exitRect = exitHole.getBoundingClientRect();

          const endX =
            exitRect.left -
            machineRect.left +
            exitRect.width / 2 -
            machineRect.width / 2;
          const endY =
            exitRect.top -
            machineRect.top +
            exitRect.height / 2 -
            machineRect.height / 2 +
            150;

          movingBall.style.setProperty("--start-x", "0px");
          movingBall.style.setProperty("--start-y", "0px");
          movingBall.style.setProperty("--mid-x", `${endX * 0.5}px`);
          movingBall.style.setProperty("--mid-y", `${endY * 0.7}px`);
          movingBall.style.setProperty("--end-x", `${endX}px`);
          movingBall.style.setProperty("--end-y", `${endY}px`);
          movingBall.style.animation =
            "dropToExit 0.55s cubic-bezier(0.55, 0, 0.55, 0.2) forwards";

          await delay(420);

          // 4. 출구에서 볼이 튀어나오는 효과
          const popBall = document.createElement("div");
          popBall.className = `machine-ball ${getColorClass(num)}`;
          popBall.textContent = num;
          popBall.style.width = "40px";
          popBall.style.height = "40px";
          popBall.style.fontSize = "16px";
          popBall.style.left = "50%";
          popBall.style.top = "50%";
          popBall.style.zIndex = "20";
          exitHole.appendChild(popBall);

          popBall.style.animation =
            "popOut 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards";

          await delay(320);

          // 5. 결과 볼을 결과 영역에 추가
          const resultBall = document.createElement("div");
          resultBall.className = `result-ball ${getColorClass(num)}`;
          resultBall.textContent = num;

          // 순서 표시
          const orderBadge = document.createElement("span");
          orderBadge.className = "ball-order";
          orderBadge.textContent = i + 1;
          resultBall.appendChild(orderBadge);

          // + 기호 (첫 번호 제외하고 앞에 붙임)
          if (i > 0) {
            const plus = document.createElement("span");
            plus.className = "plus-sign";
            plus.textContent = "+";
            resultContainer.appendChild(plus);
          }
          resultContainer.appendChild(resultBall);

          // 임시 볼들 제거
          setTimeout(() => {
            movingBall.remove();
            popBall.remove();
          }, 500);

          // 6. 다음 번호 전 대기
          await delay(720);
        }

        // 추첨 완료 효과
        const completeMsg = document.createElement("div");
        completeMsg.style.cssText =
          "position:fixed; top:50%; left:50%; font-size:3rem; color:#ffd700; text-shadow:0 0 30px rgba(255,215,0,0.5); z-index:100; animation:completePop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;";
        completeMsg.textContent = "🎉 추첨 완료!";
        document.body.appendChild(completeMsg);

        setTimeout(() => {
          completeMsg.style.animation =
            "completeFadeOut 0.4s ease-in forwards";
          setTimeout(() => completeMsg.remove(), 400);
        }, 1200);

        // 버튼 다시 활성화
        btn.disabled = false;
        btn.textContent = "🔄 다시 추첨";
      }

      // 이벤트 연결 및 초기 볼 생성
      document.getElementById("drawBtn").addEventListener("click", startDraw);
      createMachineBalls();
    </script>
  </body>
</html>
