<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>과일 산수 게임</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        .box { border: 2px solid #ccc; padding: 20px; display: inline-block; border-radius: 10px; }
        .fruit-area { font-size: 2em; margin: 20px; }
        .btn { font-size: 1.5em; margin: 10px; padding: 15px 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h1>과일 산수 퀴즈</h1>
    <div id="question" style="font-size: 2em; margin: 20px;">준비중...</div>
    <div id="choices"></div>
    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>
</div>

<script>
    let answer = 0;

    function startGame() {
        let n1 = Math.floor(Math.random() * 5) + 1;
        let n2 = Math.floor(Math.random() * 5) + 1;
        answer = n1 + n2;
        
        let fruits = "";
        for(let i=0; i<n1; i++) fruits += "🍎";
        fruits += " + ";
        for(let i=0; i<n2; i++) fruits += "🍎";
        
        document.getElementById('question').innerHTML = fruits;
        
        let choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = "";
        
        let options = [answer, answer+1, answer-1];
        options.sort(() => Math.random() - 0.5);
        
        options.forEach(opt => {
            let b = document.createElement('button');
            b.className = 'btn';
            b.innerText = opt;
            b.onclick = function() {
                if(opt === answer) {
                    document.getElementById('result').innerText = "정답!";
                    setTimeout(startGame, 1000);
                } else {
                    document.getElementById('result').innerText = "틀렸어요!";
                }
            };
            choicesDiv.appendChild(b);
        });
    }

    window.onload = startGame;
</script>

</body>
</html>
