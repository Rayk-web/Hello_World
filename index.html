<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>산수 퀴즈 대작전</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f0f8ff; padding: 50px; }
        #game-container { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        #question { font-size: 3em; margin: 20px 0; color: #34495e; }
        input { font-size: 1.5em; padding: 10px; width: 150px; text-align: center; }
        button { font-size: 1.5em; padding: 10px 20px; cursor: pointer; background-color: #27ae60; color: white; border: none; border-radius: 10px; }
        #feedback { font-size: 1.5em; margin-top: 20px; font-weight: bold; }
        #score { font-size: 1.2em; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>산수 퀴즈 대작전!</h1>
    <div id="question"></div>
    <input type="number" id="answer" placeholder="정답" autofocus>
    <button onclick="checkAnswer()">확인</button>
    <div id="feedback"></div>
    <div id="score">점수: 0</div>
</div>

<script>
    let currentAnswer = 0;
    let score = 0;

    function generateQuestion() {
        const type = Math.random() > 0.5 ? '+' : '-';
        let num1 = Math.floor(Math.random() * 50) + 1;
        let num2 = Math.floor(Math.random() * 50) + 1;

        if (type === '-') {
            // 빼기에서 결과가 음수가 되지 않도록 조정
            if (num1 < num2) [num1, num2] = [num2, num1];
            currentAnswer = num1 - num2;
        } else {
            currentAnswer = num1 + num2;
        }

        document.getElementById('question').innerText = `${num1} ${type} ${num2} = ?`;
        document.getElementById('answer').value = '';
        document.getElementById('answer').focus();
    }

    function checkAnswer() {
        const userAnswer = parseInt(document.getElementById('answer').value);
        const feedback = document.getElementById('feedback');
        
        if (userAnswer === currentAnswer) {
            score += 10;
            feedback.innerText = "정답이에요! 참 잘했어요! 🎉";
            feedback.style.color = "#27ae60";
        } else {
            feedback.innerText = `아쉬워요! 정답은 ${currentAnswer}였어요.`;
            feedback.style.color = "#e74c3c";
        }
        
        document.getElementById('score').innerText = `점수: ${score}`;
        setTimeout(generateQuestion, 1500);
    }

    // 엔터키 입력 지원
    document.getElementById('answer').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAnswer();
    });

    generateQuestion();
</script>

</body>
</html>
